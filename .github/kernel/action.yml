        cd "$ARTIFACTS_DIR"
        echo "kernel_version=${{ env.KERNEL_FULL_VER }}" >> "$GITHUB_OUTPUT"
        echo "ksu_version=${KSUVER:-unknown}" >> "$GITHUB_OUTPUT"
        echo "susfs_version=${SUSVER:-unknown}" >> "$GITHUB_OUTPUT"

        echo "Build metadata saved ✅"
        echo "::endgroup::"

    - name: Customize Kernel Branding
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Applying Kernel Branding..."
        cd "$COMMON"
        mkdir -p out
        CUSTOM_LOCALVERSION="-${ANDROID_VER}-${{ inputs.kernel_uname }}"
        echo "CUSTOM_LOCALVERSION=$CUSTOM_LOCALVERSION" >> "$GITHUB_ENV"

        echo "Kernel branding applied ✅"
        echo "::endgroup::"

    - name: Detect Clang (toolchain for build)
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Detecting Clang..."
        CLANG_FOUND=false
        for base in "$KERNEL_PLATFORM/prebuilts" "$KERNEL_PLATFORM/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done
        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
          echo "Using system clang."
        fi
        $CLANG_FOUND || { echo "No clang toolchain found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_ENV"
        echo "Detected Clang: $CLANG_VERSION"

        echo "Clang detected ✅"
        echo "::endgroup::"

    - name: Build Kernel
      shell: bash
      env:
        PYTHONWARNINGS: "ignore:invalid escape sequence"
      run: |
        set -euo pipefail
        echo "::group::Build kernel"
        cd "$COMMON"
        : > "$COMMON/.scmversion"

        # Ensure Python warnings are suppressed for scripts invoked by make
        export PYTHONWARNINGS="${PYTHONWARNINGS}"

        if [ -n "${CLANG_BIN_PATH:-}" ] && [ -x "${CLANG_BIN_PATH}/clang" ]; then
          export PATH="${CLANG_BIN_PATH}:$PATH"
        fi

        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS+=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC="ccache clang"
        )

        OUT=out
        INSTALL_MOD_PATH="$COMMON/out"
        mkdir -p "$OUT"
        make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig

        if [ "${{ inputs.optimize_level }}" = "O3" ]; then
          KCFLAGS_EXTRA="-O3"
        else
          KCFLAGS_EXTRA="-O2"
        fi

        # LOCALVERSION branding
        if [ -n "${CUSTOM_LOCALVERSION:-}" ]; then
          ./scripts/config --file "$OUT/.config" \
            --set-str LOCALVERSION "${CUSTOM_LOCALVERSION}" \
            --disable LOCALVERSION_AUTO
          sed -i 's/scm_version="$(scm_version --short)"/scm_version=""/' scripts/setlocalversion
        fi

        # Consistent flags; include -pipe and disable stack protector
        KCFLAGS="-Wno-error -pipe -fno-stack-protector ${KCFLAGS_EXTRA}"
        KCPPFLAGS="-DCONFIG_OPTIMIZE_INLINING"

        echo "Starting build with $(nproc --all) threads..."
        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig
        make -j$(nproc --all) "${MAKE_FLAGS[@]}" KCFLAGS="$KCFLAGS" KCPPFLAGS="$KCPPFLAGS" O="$OUT" Image modules
        make -j$(nproc --all) "${MAKE_FLAGS[@]}" O="$OUT" INSTALL_MOD_STRIP=1 INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

        IMG="$OUT/arch/arm64/boot/Image"
        if [ ! -f "$IMG" ]; then
          echo "Kernel Image missing"
          exit 1
        fi
        sha256sum "$IMG" | tee "$OUT/Image.sha256"
        echo "Kernel built 😆"

        cp "$OUT/System.map" "$ARTIFACTS_DIR_DEBUG"
        cp "$OUT/Module.symvers" "$ARTIFACTS_DIR_DEBUG"

        echo "::endgroup::"

    - name: Collect Build Stats / Validate Image
      id: collect_stats
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Collecting Build Stats..."
        OUT="$COMMON/out"
        IMG="$OUT/arch/arm64/boot/Image"

        WARNINGS=$(grep -i -E 'warning:' "$COMMON/build.log" | wc -l || true)
        echo "$WARNINGS" > "$OUT/warnings.txt"

        if [ -f "$IMG" ]; then
          file "$IMG" > "$OUT/Image.file" || true
          KERNEL_UNAME=$(strings "$IMG" | grep -E 'Linux version.*#' | tail -n1 || true)
          echo "Kernel Uname: ${KERNEL_UNAME:-unknown}"
          echo "KERNEL_UNAME=${KERNEL_UNAME:-unknown}" >> "$GITHUB_ENV"

          if ! file "$IMG" | grep -qi 'ARM64'; then
            echo "WARNING: Image does not appear to be ARM64:"
            file "$IMG" || true
          fi

          MIN_SIZE=$((6*1024*1024))
          ACTUAL_SIZE=$(stat -c %s "$IMG" || echo 0)
          if [ "$ACTUAL_SIZE" -lt "$MIN_SIZE" ]; then
            echo "WARNING: Image size $ACTUAL_SIZE < $MIN_SIZE (suspicious)."
          fi

          CALC_SHA=$(sha256sum "$IMG" | cut -d' ' -f1)
          if [ -f "$OUT/Image.sha256" ]; then
            REC_SHA=$(cut -d' ' -f1 "$OUT/Image.sha256" | tr -d '\n')
            if [ "$CALC_SHA" != "$REC_SHA" ]; then
              echo "WARNING: Image.sha256 mismatch. recorded=$REC_SHA calculated=$CALC_SHA"
            fi
            IMAGE_SHA256="$REC_SHA"
          else
            echo "WARNING: Image.sha256 not found, using calculated sha256."
            IMAGE_SHA256="$CALC_SHA"
          fi
        else
          echo "WARNING: Image file not found at $IMG"
          IMAGE_SHA256=""
          KERNEL_UNAME="unknown"
          echo "KERNEL_UNAME=unknown" >> "$GITHUB_ENV"
        fi

        echo "Image sha256: ${IMAGE_SHA256:-none}"
        echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
        echo "image_sha256=${IMAGE_SHA256:-}" >> "$GITHUB_OUTPUT"

        echo "Build stats collected ✅"
        echo "::endgroup::"

    - name: Create Kernel ZIP
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Creating AK3 zip..."
        IMAGE_PATH="$COMMON/out/arch/arm64/boot/Image"
        if [ ! -f "$IMAGE_PATH" ]; then
          echo "ERROR: Built Image not found"
          exit 1
        fi

        # Put Image into AnyKernel3
        cp "$IMAGE_PATH" "$GITHUB_WORKSPACE/AnyKernel3/Image"
        cd "$GITHUB_WORKSPACE/AnyKernel3"

        sed -i '7 c\kernel.string=EmberHeart Kernel by nullptr-t-oss' anykernel.sh
        curl -s https://raw.githubusercontent.com/nullptr-t-oss/kernel_patches/refs/heads/main/banner > banner

        if [ "${{ inputs.use_susfs }}" = "true" ]; then
          ZIP_NAME="AnyKernel3_${MODEL}_${{ inputs.optimize_level }}_${{ env.KERNEL_FULL_VER }}_Next_${KSUVER}_SuSFS_${SUSVER}.zip"
        else
          ZIP_NAME="AnyKernel3_${MODEL}_${{ inputs.optimize_level }}_${{ env.KERNEL_FULL_VER }}_Next_${KSUVER}.zip"
        fi

        echo "Creating flashable zip: $ZIP_NAME"
        ( cd "$GITHUB_WORKSPACE/AnyKernel3" && zip -r "$ARTIFACTS_DIR/$ZIP_NAME" ./* >/dev/null )

        # Keep only the flashable zip and the model metadata file (assumed already created earlier)
        find "$ARTIFACTS_DIR" -maxdepth 1 -type f ! -name "$ZIP_NAME" ! -name "${MODEL}.txt" -delete

        # Output for later steps (optional)
        echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

        echo "AnyKernel3 zip created ✅"
        echo "::endgroup::"

    - name: Create Boot Image
      if: success() && steps.create_zip.conclusion == 'success'
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Creating boot image..."
        OUT="$COMMON/out"
        IMAGE="$OUT/arch/arm64/boot/Image"
        MKBOOTIMG="$KERNEL_PLATFORM/tools/mkbootimg/mkbootimg.py"

        export PATH="$KERNEL_PLATFORM/build/build-tools/path/linux-x86:$PATH"

        MKBOOTIMG_ARGS=(
          "--header_version" "4"
          "--os_version" "13.0.0"
          "--os_patch_level" "2099-12-01"
          "--pagesize" "4096"
          "--kernel" "$IMAGE"
          "--output" "$OUT/boot.img"
        )

        echo "Creating boot image"
        "$MKBOOTIMG" "${MKBOOTIMG_ARGS[@]}"

        echo "Signing boot image"

        avbtool add_hash_footer \
          --partition_name boot \
          --partition_size "$BOOT_PARTITION_SIZE" \
          --image "$OUT/boot.img" \
          --algorithm "SHA256_RSA4096" \
          --key "$KERNEL_PLATFORM/tools/mkbootimg/gki/testdata/testkey_rsa4096.pem"

        cp "$OUT/boot.img" "$ARTIFACTS_DIR"

        echo "Boot image created ✅"
        echo "::endgroup::"

    - name: Create system_dlkm Image
      id: create_system_dlkm
      shell: bash
      run: |
        PREBUILTS="https://raw.githubusercontent.com/nullptr-t-oss/kernel_patches/refs/heads/main/prebuilts/$MODEL"
        OUT="$COMMON/out"
        UNAME=$(ls "$OUT/lib/modules/")
        DLKM_STAGING_DIR="$OUT/system_dlkm_staging"
        DLKM_STAGING_ROOT="$DLKM_STAGING_DIR/lib/modules/$UNAME"

        export PATH="$KERNEL_PLATFORM/build/build-tools/path/linux-x86:$PATH"

        # Don't create DLKM_STAGING_DIR and copy the OUT/lib folder cause it has many unnecessary files
        # Instead create lib and copy modules folder from OUT/lib/modules to DLKM_STAGING_DIR/lib/
        mkdir -p "$DLKM_STAGING_DIR/lib"
        
        # copy modules and other files generated by depmod to staging dir
        cp -a "$OUT/lib/modules" "$DLKM_STAGING_DIR/lib/"
        cp "$DLKM_STAGING_ROOT/modules.order" "$DLKM_STAGING_ROOT/modules.load"
        cp "$DLKM_STAGING_ROOT/modules.load" "$OUT/system_dlkm.modules.load"

        # remove unnecessary files from DLKM_STAGING_ROOT
        cd "$DLKM_STAGING_ROOT"
        rm build source modules.builtin.modinfo

        # add other files found in stock system_dlkm
        cd "$DLKM_STAGING_DIR"
        mkdir -p etc
        cd etc
        curl -sL -o build.prop "$PREBUILTS/system_dlkm/build.prop"
        touch fs_config_dirs fs_config_files

        cd "$OUT"
        # Create temporary prop file for system_dlkm image
        system_dlkm_props_file="$(mktemp)"
        echo -e "system_dlkm_fs_type=ext4\n" >> ${system_dlkm_props_file}
        echo -e "use_dynamic_partition_size=true\n" >> ${system_dlkm_props_file}
        echo -e "ext_mkuserimg=mkuserimg_mke2fs\n" >> ${system_dlkm_props_file}
        echo -e "ext4_share_dup_blocks=true\n" >> ${system_dlkm_props_file}

        build_image "$DLKM_STAGING_DIR" "${system_dlkm_props_file}" "$OUT/system_dlkm.img" /dev/null

        avbtool add_hashtree_footer \
            --partition_name system_dlkm \
            --image "$OUT/system_dlkm.img"

        cp "$OUT/system_dlkm.img" "$ARTIFACTS_DIR"
        cp "$OUT/system_dlkm.modules.load" "$ARTIFACTS_DIR"
        cp "$OUT/system_dlkm.modules.load" "$ARTIFACTS_DIR_DEBUG"

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "Model: ${MODEL}"
          echo "Android: ${{ env.ANDROID_VER }}"
          echo "Kernel base: ${{ env.KERNEL_VER }}"
          echo "Kernel full: ${{ env.KERNEL_FULL_VER }}"
          echo "Kernel Uname: ${{ env.KERNEL_UNAME }}"
          echo "KSUN Version: ${KSUVER:-unknown}"
          echo "KSUN commit SHA: ${{ env.KSUN_COMMIT_SHA }}"
          echo "SUSFS Version: ${SUSVER:-unknown}"
          echo "SUSFS commit SHA: ${{ env.SUSFS_COMMIT_SHA }}"
          echo "Optimization: ${{ inputs.optimize_level }}"
          echo "Image SHA256: ${{ steps.collect_stats.outputs.image_sha256 }}"
          echo "Compiler: ${CLANG_VERSION:-unknown}"
          echo ""
          echo "CCache Statistics :"
          echo "$(ccache -s -v)"
        } | tee summary.txt
        {
          echo "### Kernel Build Summary"
          echo ""
          echo "- Model: ${{ env.MODEL }}"
          echo "- Android: ${{ env.ANDROID_VER }}"
          echo "- Kernel Version: ${{ steps.save_metadata.outputs.kernel_version }}"
          echo "- Kernel Uname: ${{ env.KERNEL_UNAME }}"
          echo "- KSUN Version: ${KSUVER:-unknown}"
          echo "- KSUN commit SHA: [${{ env.KSUN_COMMIT_SHA }}](https://github.com/KernelSU-Next/KernelSU-Next/commit/${{ env.KSUN_COMMIT_SHA }})"
          echo "- SUSFS Version: ${SUSVER:-unknown}"
          echo "- SUSFS commit SHA: [${{ env.SUSFS_COMMIT_SHA }}](https://gitlab.com/simonpunk/susfs4ksu/-/commit/${{ env.SUSFS_COMMIT_SHA }})"
          echo "- Optimization: ${{ inputs.optimize_level }}"
          echo "- Image SHA256: ${{ steps.collect_stats.outputs.image_sha256 }}"
          echo ""
          echo "CCache Statistics :"
          echo "$(/usr/bin/ccache -s)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Cleanup old ccache
      shell: bash
      run: |
        set -euo pipefail
        echo "Deleting old ccache..."
        gh cache delete ccache-${{ env.CONFIG }}-kernel-${{ inputs.optimize_level }}-${{ env.KERNEL_FULL_VER }}- || true

    - name: Upload Artifacts
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/

    - name: Upload Debug zip
      uses: actions/upload-artifact@v4
      with:
        name: debug-common-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/debug/artifacts/
