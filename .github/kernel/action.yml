name: Build OnePlus EmberHeart Kernel

permissions:
  contents: write
  actions: write

inputs:
  ksun_branch_or_hash:
    required: true
    type: string
    default: ""
  evict_unused_ccache:
    description: 'Do you want to evict unused ccache?'
    required: true
    type: string
    default: 'false'
  use_opt_patches:
    description: 'Do you want to add optimization patches in kernel?'
    required: false
    type: string
    default: 'false'
  use_susfs:
    description: 'Do you want to add susfs in kernel?'
    required: false
    type: string
    default: 'false'
  susfs_commit_hash_or_branch:
    required: false
    type: string
    default: ""
  optimize_level:
    required: false
    type: string
    default: O2  # Choices: O2 or O3
  lto:
    required: false
    type: string
    default: Thin  # Choices: Thin or Full
  kernel_uname:
    required: false
    type: string
    default: ""
  compile_dlkm:
    description: 'Do you want to compile dlkm and vendor boot?'
    required: false
    type: string
    default: 'false'

outputs:
  kernel_version:
    value: ${{ steps.get_kernel_version.outputs.kernel_version }}
  ksun_version:
    value: ${{ steps.add_ksun.outputs.ksun_version }}
  ksun_tag:
    value: ${{ steps.add_ksun.outputs.ksun_tag }}
  susfs_version:
    value: ${{ steps.add_susfs.outputs.susfs_version }}
  kernel_sha256:
    value: ${{ steps.collect_kernel_stats.outputs.image_sha256 }}
  boot_sha256:
    value: ${{ steps.create_boot.outputs.boot_sha256 }}
  system_dlkm_sha256:
    value: ${{ steps.create_system_dlkm.outputs.system_dlkm_sha256 }}

runs:
  using: composite
  steps:
    - name: Get Kernel Version Info
      id: get_kernel_version
      shell: bash
      run: |
        set -euo pipefail
        cd "$COMMON"
        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""
        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then BRANCH_LINE="$l"; break; fi
          fi
        done
        if [ -z "$BRANCH_LINE" ]; then
          echo "Error: No BRANCH= found"; exit 1
        fi
        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_RELEASE="${BRANCH_VALUE%-*}"
        if [ -z "$ANDROID_RELEASE" ]; then
          echo "Could not parse android version from BRANCH=$BRANCH_VALUE"
          exit 1
        fi
        KERNEL_VERSION=$(make kernelversion)
        VERSION=$(echo $KERNEL_VERSION | cut -d'.' -f1)
        PATCHLEVEL=$(echo $KERNEL_VERSION | cut -d'.' -f2)
        SUBLEVEL=$(echo $KERNEL_VERSION | cut -d'.' -f3)
        cd "$ARTIFACTS_DIR"
        echo "$ANDROID_RELEASE-$KERNEL_VERSION" > "${MODEL}.txt"
        echo "ANDROID_RELEASE=$ANDROID_RELEASE" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_RELEASE-$KERNEL_VERSION" >> "$GITHUB_ENV"
        echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_RELEASE-$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "kernel_version=$ANDROID_RELEASE-$KERNEL_VERSION" >> "$GITHUB_OUTPUT"

    - name: Set Build Identity
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Set build user/host"

        BUILD_USER="EmberHeart"
        BUILD_HOST="OnePlus"

        echo "KBUILD_BUILD_USER=$BUILD_USER" >> "$GITHUB_ENV"
        echo "KBUILD_BUILD_HOST=$BUILD_HOST" >> "$GITHUB_ENV"

        echo ""
        echo "✅ Build identity configured:"
        echo "   User: $BUILD_USER"
        echo "   Host: $BUILD_HOST"
        echo "::endgroup::"

    - name: Configure ccache & LTO caching
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p "$CCACHE_DIR"
        mkdir -p "$LDCACHE_DIR"

        ccache -o compression=false
        ccache -M 5G

        # Use for ccache eviction
        echo "ccache_start=$(date +%s)" >> "$GITHUB_ENV"

    - name: Restore ccache
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-${{ env.MODEL }}-kernel-${{ inputs.optimize_level }}-${{ env.KERNEL_FULL_VER }}-${{ inputs.lto }}_LTO
        restore-keys: |
          ccache-${{ env.MODEL }}-kernel-${{ inputs.optimize_level }}-${{ env.KERNEL_FULL_VER }}
          ccache-${{ env.MODEL }}-kernel-${{ inputs.optimize_level }}-

    - name: Restore LTO cache
      if: ${{ inputs.lto == 'Thin'}}
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.LDCACHE_DIR }}
        key: LTO-${{ env.MODEL }}-kernel-${{ inputs.optimize_level }}-${{ env.KERNEL_FULL_VER }}
        restore-keys: |
          LTO-${{ env.MODEL }}-kernel-${{ inputs.optimize_level }}-${{ env.KERNEL_FULL_VER }}
          LTO-${{ env.MODEL }}-kernel-${{ inputs.optimize_level }}-

    - name: Clone AnyKernel3 and Other Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "Cloning AnyKernel3 and other dependencies..."
        ANYKERNEL_BRANCH="gki-2.0"

        echo "Using AnyKernel3 branch: $ANYKERNEL_BRANCH"
        git clone --depth=1 https://github.com/terminal-beginner/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
        git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git
        git clone --depth=1 https://github.com/terminal-beginner/kernel_patches.git my_patches

    - name: Clone susfs
      if: ${{ inputs.use_susfs == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        if [[ -z "${{ inputs.susfs_commit_hash_or_branch }}" ]]; then
          SUSFS_BRANCH="${{ env.SUSFS_KERNEL_BRANCH }}"
        else
          SUSFS_BRANCH="${{ inputs.susfs_commit_hash_or_branch }}"
        fi
        echo "Using SUSFS branch: $SUSFS_BRANCH"
        git clone https://gitlab.com/simonpunk/susfs4ksu.git
        cd susfs4ksu
        if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1 || git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
          SUSFS_COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA" >> $GITHUB_ENV
        else
          echo "Error: SUSFS branch or ref '$SUSFS_BRANCH' not found."
          exit 1
        fi

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$KERNEL_PLATFORM"
        rm -f common/android/abi_gki_protected_exports_* || true
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true
        df -h

    - name: Add KernelSU Next
      id: add_ksun
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Add KernelSU Next"
        cd "$KERNEL_PLATFORM"
        echo "Adding KernelSU Next..."
        if [ "${{ inputs.ksun_branch_or_hash }}" = "" ]; then
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -
        else
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s "${{ inputs.ksun_branch_or_hash }}"
        fi
        git submodule update --init --recursive
        cd KernelSU-Next/kernel

        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        KSUN_TAG=$(git describe --tags --abbrev=0 2>/dev/null)

        if [ $COMMITS_COUNT -lt 2684 ]; then
          BASE_VERSION=10200
        else
          BASE_VERSION=30000
        fi

        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile

        if [ -f ksu.c ]; then
          sed -i 's/#if defined(CONFIG_STACKPROTECTOR) && (defined(CONFIG_ARM64) && !defined(CONFIG_STACKPROTECTOR_PER_TASK))/#if 0/' ksu.c
        fi

        if [[ "$KSU_VERSION" -gt 33095 ]] && [[ "${{ env.KERNEL_VER }}" == "6.12" ]]; then
          sed -i 's|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include -I$(KSU_KERNEL_DIR)/include/uapi|' Kbuild
          sed -i 's|$(src)|$(abspath $(src))|' Kbuild
          sed -i 's|$(srctree)/$(src)|$(abspath $(srctree)/$(src))|' Kbuild
        fi

        if [ "$KSU_VERSION" -lt 12884 ]; then
          echo "NEED_HOOKS=true" >> $GITHUB_ENV
        else
          echo "NEED_HOOKS=false" >> $GITHUB_ENV
        fi

        cd ..
        KSUN_COMMIT_SHA=$(git rev-parse --short HEAD)
        echo "KSUN_COMMIT_SHA=${KSUN_COMMIT_SHA}" >> $GITHUB_ENV

        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
        echo "ksun_version=${KSU_VERSION}" >> "$GITHUB_OUTPUT"
        echo "ksun_tag=${KSUN_TAG}" >> "$GITHUB_OUTPUT"
        echo "KernelSU Next Version: $KSU_VERSION"
        echo "KernelSU Next added (commit: ${KSUN_COMMIT_SHA}) ✅"
        echo "::endgroup::"

    - name: Apply SUSFS Patches
      id: add_susfs
      if: ${{ inputs.use_susfs == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Applying SUSFS patches..."
        cd "$KERNEL_PLATFORM"
        cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_${{ env.SUSFS_KERNEL_BRANCH }}.patch ./common/
        cp ../../susfs4ksu/kernel_patches/fs/* ./common/fs/
        cp ../../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
        cd ./KernelSU-Next
        susfs_version=$(grep '#define SUSFS_VERSION' ../common/include/linux/susfs.h | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        echo "susfs_version=${susfs_version:-unknown}" >> $GITHUB_OUTPUT
        echo "SuSFS Version: $susfs_version"
        cd ../
        # Function to compare semantic versions
        version_lte() {
          [ "$(printf '%s\n' "$2" "$1" | sort -V | head -n1)" = "$1" ]
        }

        if version_lte "${susfs_version:1}" "1.5.12"; then
          echo "NEED_HOOKS=true" >> $GITHUB_ENV
        else
          echo "NEED_HOOKS=false" >> $GITHUB_ENV
        fi

        case "$susfs_version" in
          "v1.5.8")
            cd ./KernelSU-Next
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch  || true
            cp "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/fix_apk_sign.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_apk_sign.c.patch
            cp "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/fix_core_hook.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_core_hook.c.patch
            cp "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/fix_selinux.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_selinux.c.patch
            cp "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/fix_ksud.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_ksud.c.patch
            ;;
          "v1.5.9"|"v1.5.10"|"v1.5.11"|"v1.5.12")
            cd ./KernelSU-Next
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            patch -p1 --forward < 10_enable_susfs_for_ksu.patch  || true
            for file in $(find ./kernel -maxdepth 2 -name "*.rej" -printf "%f\n" | cut -d'.' -f1); do
              echo "Patching file: $file.c with fix_$file.c.patch"
              patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/fix_$file.c.patch"
            done
            patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/fix_kernel_compat.c.patch"
            ;;
          "v2.0.0")
            cd ./KernelSU-Next
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./

            patch -p1 --forward < 10_enable_susfs_for_ksu.patch  || true

            for file in $(find ./kernel -maxdepth 2 -name "*.rej" -exec basename {} .rej \;); do
              echo "Patching file: $file with fix_$file.patch"
              patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/fix_$file.patch"
            done
            echo "Patching Hook Mode!"
            patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/overwrite_hook_mode.patch"
            echo "Patching KSU_TOOLKIT Support for SuSFS kernel!"
            patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/ksu_toolkit.patch"
            ;;
          "v2.1.0")
            cd ./KernelSU-Next
            patch -p1 --forward < "../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
            for file in $(find ./kernel -maxdepth 2 -name "*.rej" -exec basename {} .rej \;); do
              echo "Patching file: $file with fix_$file.patch"
              patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/fix_$file.patch"
            done
            echo "Patching Hook Mode!"
            patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/overwrite_hook_mode.patch"
            echo "Patching KSU_TOOLKIT Support for SusFS kernel!"
            patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/ksu_toolkit.patch"

            if [ "$KSUVER" -le 33095 ]; then
              echo "Patching Multi-manager Support for SusFS kernel!"
              patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/multi_manager.patch"
            fi

            if [ "$KSUVER" -ge 33068 ] && [ "$KSUVER" -lt 33070 ]; then
                echo "Patching Multi-manager sepolicy Support for SusFS kernel!"
                patch -p1 --forward < "$WILD_KERNEL_PATCHES/next/susfs_fix_patches/$susfs_version/multi_sepolicy_fix.patch"
            fi
            ;;
          *)
            echo "::error::Unsupported SUSFS version: $susfs_version"
            exit 1
            ;;
        esac
        cd $COMMON
        if [ "${{ env.ANDROID_RELEASE }}" = "android15" ] && [ "${{ env.KERNEL_VER }}" = "6.6" ]; then
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
          fi
        fi

        # Fake kernel patch to fix failures
        fake_patched=0
        if [ "${{ env.ANDROID_RELEASE }}" = "android15" ] && [ "${{ env.KERNEL_VER }}" = "6.6" ]; then
          if ! grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
            echo "nr_subpages Line not found. Fake Patching!"
            sed -i -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;' -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t \*res = NULL;' ./fs/proc/task_mmu.c
            fake_patched=1
          fi
        fi

        if ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
            echo "#include <linux/dma-buf.h> Line not found. Adding missing header"
            sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
          fi
          
          if ! grep -qxF '#include <linux/zswap.h>' ./mm/memory.c; then
            echo "#include <linux/zswap.h> Line not found. Adding missing header"
            sed -i '/#include <linux\/sched\/sysctl.h>/a #include <linux\/zswap.h>' ./mm/memory.c
          fi
          
          if grep -qF 'if (vma->vm_end > last_vma_end)' ./fs/proc/task_mmu.c && ! grep -qxF 'SUSFS_IS_INODE_SUS_MAP' ./fs/proc/task_mmu.c; then
            echo "Temporarily expand the `last_vma_end` `if` block to fix a matching issue."
            perl -i -0pe 's/\t\t\tif \(vma->vm_end > last_vma_end\)\n\t\t\t\tsmap_gather_stats\(vma, &mss, last_vma_end\);/\t\t\tif (vma->vm_end > last_vma_end) {\n\t\t\t\tsmap_gather_stats(vma, \&mss, last_vma_end);\n\t\t\t\tlast_vma_end = vma->vm_end;\n\t\t\t}/' ./fs/proc/task_mmu.c
            fake_patched_expand=1
          fi
        fi

        if [ "${{ env.ANDROID_RELEASE }}" = "android12" ] && [ "${{ env.KERNEL_VER }}" = "5.10" ]; then
          if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
            echo "vma_pages Line not found. Fake Patching!"
            fake_patched=1
          fi
        fi

        if [ "${{ env.ANDROID_RELEASE }}" = "android13" ] && [ "${{ env.KERNEL_VER }}" = "5.15" ]; then
          if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
            echo "vma_pages Line not found. Fake Patching!"
            fake_patched=1
          fi

          if grep -qxF '#include <linux/swap_slots.h>' ./mm/memory.c; then
            echo "#include swap_slots.h> Line found. Deleting header."
            sed -i '/#include <linux\/swap_slots.h>/d' ./mm/memory.c
            fake_patched=1
          fi
        fi

        if [ "${{ env.ANDROID_RELEASE }}" = "android14" ] && [ "${{ env.KERNEL_VER }}" = "6.1" ]; then
          if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
            echo "vma_pages Line not found. Fake Patching!"
            fake_patched=1
          fi
          
          if ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
            echo "#include <linux/dma-buf.h> Line not found. Adding missing header"
            sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
          fi
        fi

        patch -p1 < 50_add_susfs_in_${{ env.SUSFS_KERNEL_BRANCH }}.patch

        # Revert Fake kernel patch
        if [ "$fake_patched_expand" = 1 ]; then
          if [ "${{ env.ANDROID_RELEASE }}" = "android15" ] && [ "${{ env.KERNEL_VER }}" = "6.6" ]; then
            if grep -qF 'if (vma->vm_end > last_vma_end) {' ./fs/proc/task_mmu.c && ! grep -qxF 'SUSFS_IS_INODE_SUS_MAP' ./fs/proc/task_mmu.c; then
              perl -i -0pe 's/\t\t\tif \(vma->vm_end > last_vma_end\) \{\n\t\t\t\tsmap_gather_stats\(vma, &mss, last_vma_end\);\n\t\t\t\tlast_vma_end = vma->vm_end;\n\t\t\t\}/\t\t\tif (vma->vm_end > last_vma_end)\n\t\t\t\tsmap_gather_stats(vma, \&mss, last_vma_end);/' ./fs/proc/task_mmu.c
            fi
          fi
        fi

        if [ "$fake_patched" = 1 ]; then
          if [ "${{ env.ANDROID_RELEASE }}" = "android15" ] && [ "${{ env.KERNEL_VER }}" = "6.6" ]; then
            if grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
              echo "nr_subpages Line found. Revert Fake Patching!"
              sed -i -e '/unsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;/d' -e '/pagemap_entry_t \*res = NULL;/d' ./fs/proc/task_mmu.c
            fi
          fi
          if [ "${{ env.ANDROID_RELEASE }}" = "android12" ] && [ "${{ env.KERNEL_VER }}" = "5.10" ]; then
            if grep -qxF $'\t\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
              echo "vma_pages Line found. Revert Fake Patching!"
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi
          if [ "${{ env.ANDROID_RELEASE }}" = "android13" ] && [ "${{ env.KERNEL_VER }}" = "5.15" ]; then
            if grep -qxF $'\t\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
              echo "vma_pages Line found. Revert Fake Patching!"
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi

            if ! grep -qxF '#include <linux/swap_slots.h>' ./mm/memory.c; then
              echo "#include <linux/swap_slots.h> Line not found. Adding missing header"
              sed -i '/#include <linux\/vmalloc.h>/a #include <linux\/swap_slots.h>' ./mm/memory.c
            fi
          fi
          if [ "${{ env.ANDROID_RELEASE }}" = "android14" ] && [ "${{ env.KERNEL_VER }}" = "6.1" ]; then
            if grep -qxF $'\t\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
              echo "vma_pages Line found. Revert Fake Patching!"
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi
        fi

        echo "SuSFS added ✅"
        echo "::endgroup::"

    - name: Patch Ptrace
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::"
        cd "$COMMON"
        KERNEL_VERSION="${{ env.KERNEL_VER }}"
        MIN_VERSION="5.16"
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          echo "Patching ptrace!"
          patch -p1 -F 3 < "$WILD_KERNEL_PATCHES/gki_ptrace.patch"
        else
          echo "Kernel >= $MIN_VERSION, skipping ptrace patch"
        fi
        echo "::endgroup::"

    - name: Add BBG
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Adding BBG"
        cd "$KERNEL_PLATFORM"
        echo "Adding BBG..."
        if ! wget -q -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash -s main; then
          echo "::warning::BBG setup script failed, continuing anyway"
        fi
        cd "$COMMON"
        ./scripts/config --file arch/arm64/configs/gki_defconfig --enable CONFIG_BBG
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
        echo "BBG LSM added ✅"
        echo "::endgroup::"

    - name: Apply KSUN Hooks
      shell: bash
      if: ${{ env.NEED_HOOKS == 'true' }}
      run: |
        set -euo pipefail
        cd "$COMMON"
        patch -p1 < $WILD_KERNEL_PATCHES/next/scope_min_manual_hooks_v1.4.patch

    - name: Add KernelSU-Next Configuration Settings
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Adding KernelSU configs..."
        cd "$COMMON"

        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_KSU \
          --disable CONFIG_KSU_KPROBES_HOOK \
          --enable CONFIG_TMPFS_XATTR \
          --enable CONFIG_TMPFS_POSIX_ACL

        echo "KernelSU and SUSFS configuration added ✅"
        echo "::endgroup::"

    - name: Add SUSFS Configuration Settings
      if: ${{ inputs.use_susfs == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Adding SUSFS configs..."
        cd "$COMMON"

        ./scripts/config --file arch/arm64/configs/gki_defconfig \
