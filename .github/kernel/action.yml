    - name: Add other kernel patches to common kernel
      if: ${{ inputs.use_opt_patches == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Applying patches from wild kernels..."
        cd "$COMMON"

        KERNEL_VERSION="${{ env.KERNEL_VER }}"
        MIN_VERSION="5.16"

        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/optimized_mem_operations.patch"
        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/file_struct_8bytes_align.patch"
        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/reduce_cache_pressure.patch"

        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/mem_opt_prefetch.patch"

        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | tail -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/optimise_memcmp.patch"
        elif [ "$(printf '%s\n' "$KERNEL_VERSION" "5.11" | sort -V | tail -n1)" = "$KERNEL_VERSION" ]; then
          sed -e 's/SYM_FUNC_START(__pi_memcmp)/SYM_FUNC_START_WEAK_PI(memcmp)/' -e 's/SYM_FUNC_END(__pi_memcmp)/SYM_FUNC_END_PI(memcmp)/' -e 's/SYM_FUNC_ALIAS_WEAK(memcmp, __pi_memcmp)/EXPORT_SYMBOL_NOKASAN(memcmp)/' "$WILD_KERNEL_PATCHES/common/optimise_memcmp.patch" | patch -p1 --forward
        else
          echo "Optimised memcmp patch not found!"
        fi

        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/minimise_wakeup_time.patch"
        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/int_sqrt.patch"
        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/force_tcp_nodelay.patch"
        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/reduce_gc_thread_sleep_time.patch"
        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/add_timeout_wakelocks_globally.patch"
        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/f2fs_reduce_congestion.patch"
        patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/reduce_freeze_timeout.patch"

        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 --forward < "$WILD_KERNEL_PATCHES/common/clear_page_16bytes_align.patch"
        else
          cat "$WILD_KERNEL_PATCHES/common/clear_page_16bytes_align.patch" | sed -e 's/SYM_FUNC_START_PI(clear_page)/SYM_FUNC_START_PI(__pi_clear_page)/' | patch -p1 -F3 --forward
        fi

        patch -p1 -F3 --forward < "$WILD_KERNEL_PATCHES/common/add_limitation_scaling_min_freq.patch"
        patch -p1 -F3 --forward < "$WILD_KERNEL_PATCHES/common/re_write_limitation_scaling_min_freq.patch"
        patch -p1 -F3 --forward < "$WILD_KERNEL_PATCHES/common/adjust_cpu_scan_order.patch"
